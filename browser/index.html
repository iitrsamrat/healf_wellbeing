<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healf — Personalisation Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f8f6;
      color: #1a1a1a;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e8e8e4;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .user-select {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: #666;
    }

    .user-select select {
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
    }

    .intent-bar {
      background: #1a1a1a;
      color: #fff;
      padding: 10px 32px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .intent-bar span {
      color: #aaa;
    }

    .intent-pills {
      display: flex;
      gap: 8px;
    }

    .intent-pill {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      background: #333;
    }

    .intent-pill.active {
      background: #fff;
      color: #1a1a1a;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      min-height: calc(100vh - 113px);
    }

    .sidebar {
      background: #fff;
      border-right: 1px solid #e8e8e4;
      padding: 24px;
    }

    .sidebar h3 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 16px;
    }

    .user-card {
      background: #f8f8f6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .user-card .name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .user-card .meta {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      margin: 2px;
      background: #eee;
      color: #444;
    }

    .tag.zone {
      background: #1a1a1a;
      color: #fff;
    }

    .tag.goal {
      background: #e8f4e8;
      color: #2d6a2d;
    }

    .tag.owned {
      background: #fef3e2;
      color: #8a5500;
    }

    .helix-chips {
      margin-bottom: 24px;
    }

    .chip {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      margin-bottom: 8px;
      border: 1px solid #e8e8e4;
      border-radius: 20px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chip:hover {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .main {
      padding: 32px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 20px;
    }

    .section-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .section-header .context-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 500;
    }

    .badge-personalised {
      background: #e8f4e8;
      color: #2d6a2d;
    }

    .badge-cold {
      background: #fef3e2;
      color: #8a5500;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .product-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e8e8e4;
      transition: box-shadow 0.15s;
      cursor: pointer;
    }

    .product-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .product-card .pillar {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 6px;
    }

    .product-card .pname {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .product-card .brand {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .product-card .price {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .pdp-panel {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8e4;
      padding: 24px;
      margin-bottom: 40px;
    }

    .pdp-panel h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .pdp-product {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #f0f0ec;
    }

    .pdp-product .info {
      flex: 1;
    }

    .pdp-product .info .name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .pdp-product .info .brand-line {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
    }

    .pdp-product .info .benefits {
      font-size: 13px;
      color: #444;
      line-height: 1.5;
    }

    .why-block {
      border: 1px solid #c8e6c8;
      background: #f0faf0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .why-block.biomarker {
      border-color: #b8cef8;
      background: #eef3fe;
    }

    .why-block .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #2d6a2d;
      margin-bottom: 6px;
    }

    .why-block.biomarker .label {
      color: #1a4a8a;
    }

    .why-block .text {
      font-size: 13px;
      line-height: 1.5;
      color: #333;
    }

    .add-to-cart {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
    }

    .stack-section {
      margin-top: 20px;
    }

    .stack-section h4 {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
    }

    .stack-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stack-card {
      background: #f8f8f6;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
    }

    .stack-card .sname {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .stack-card .sbrand {
      color: #888;
      margin-bottom: 4px;
    }

    .stack-card .sprice {
      font-weight: 600;
    }

    .helix-panel {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 24px;
      color: #fff;
      margin-bottom: 40px;
    }

    .helix-panel h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .helix-panel .sub {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }

    .helix-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .helix-input {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-size: 13px;
    }

    .helix-input::placeholder {
      color: #666;
    }

    .helix-send {
      background: #fff;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }

    .helix-rec {
      background: #2a2a2a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }

    .helix-rec .rname {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .helix-rec .ragents {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
    }

    .helix-rec .rreason {
      font-size: 12px;
      color: #ccc;
      line-height: 1.5;
    }

    .confidence {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 8px;
    }

    .conf-high {
      background: #1a3a1a;
      color: #6fc96f;
    }

    .conf-moderate {
      background: #3a3a1a;
      color: #c9c96f;
    }

    .conflict-flag {
      color: #c96f6f;
      font-size: 11px;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: #f0f0ec;
      border-radius: 10px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      color: #666;
      border: none;
      background: none;
    }

    .tab.active {
      background: #fff;
      color: #1a1a1a;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    .signal-strip {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #666;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .signal-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .signal-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-green {
      background: #4caf50;
    }

    .dot-amber {
      background: #ff9800;
    }

    .dot-gray {
      background: #bbb;
    }

    .nudge-banner {
      background: #fff8e8;
      border: 1px solid #f0c040;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nudge-banner .nudge-text {
      font-size: 13px;
      color: #8a5500;
      line-height: 1.5;
    }

    .nudge-banner .nudge-cta {
      background: #8a5500;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      margin-left: 16px;
    }
  </style>
</head>

<body>

  <header>
    <h1>healf.</h1>
    <div class="user-select">
      Viewing as:
      <select id="userSelect" onchange="switchUser(this.value)">
        <option value="u001">Sarah — sleep goals, 1 purchase</option>
        <option value="u002">James — move goals, 3 purchases</option>
        <option value="u003">Priya — Zone member, deficient biomarkers</option>
        <option value="u004">Tom — cold start, no data</option>
        <option value="u005">Elena — Zone member, 2 tests, cardiovascular pattern</option>
        <option value="u006">Marcus — Zone member, missed second test</option>
      </select>
    </div>
  </header>

  <div class="intent-bar">
    <span>On-browser model (ONNX):</span>
    <div class="intent-pills">
      <div class="intent-pill" id="pill-eat">EAT</div>
      <div class="intent-pill" id="pill-move">MOVE</div>
      <div class="intent-pill" id="pill-mind">MIND</div>
      <div class="intent-pill" id="pill-sleep">SLEEP</div>
    </div>
    <span id="intent-label" style="color:#666">No session data yet — browse products to see intent update</span>
    <button onclick="resetSession()" style="
    background: #333; color: #aaa; border: 1px solid #555;
    border-radius: 6px; padding: 3px 10px; font-size: 11px;
    cursor: pointer; margin-left: auto;">
      Reset session
    </button>
  </div>

  <div class="layout">
    <div class="sidebar">
      <h3>User profile</h3>
      <div id="userCard" class="user-card"></div>
      <h3>Helix</h3>
      <div class="helix-chips" id="helixChips"></div>
    </div>

    <div class="main">
      <div class="tabs">
        <button class="tab active" onclick="showTab('foryou', this)">For You page</button>
        <button class="tab" onclick="showTab('pdp', this)">Product page</button>
        <button class="tab" onclick="showTab('helix', this)">Helix</button>
      </div>

      <div id="tab-foryou">
        <div id="nudgeBanner"></div>
        <div class="signal-strip" id="signalStrip"></div>
        <div class="section-header">
          <h2 id="shelfTitle">For you this week</h2>
          <span class="context-badge badge-personalised" id="contextBadge">Personalised</span>
        </div>
        <div class="product-grid" id="productGrid"></div>
      </div>

      <!-- PDP tab -->
      <div id="tab-pdp" style="display:none">
        <div class="pdp-panel">
          <h3 id="pdpTitle">Product page</h3>
          <div class="pdp-product">
            <div class="info">
              <div class="name" id="pdpName"></div>
              <div class="brand-line" id="pdpBrandLine"></div>
              <div class="benefits" id="pdpBenefits"></div>
            </div>
          </div>
          <div id="whyBlock"></div>
          <button class="add-to-cart" id="pdpCartBtn">Add to cart</button>
          <div class="stack-section" id="stackSection"></div>
        </div>
      </div>

      <div id="tab-helix" style="display:none">
        <div class="helix-panel">
          <h3>healf.Helix</h3>
          <div class="sub">Four-agent reasoning — Eat · Move · Mind · Sleep</div>
          <div class="helix-input-row">
            <input class="helix-input" id="helixInput"
              placeholder="Tell me about your health goals or what you want to improve..." />
            <button class="helix-send" onclick="sendToHelix()">Ask</button>
            <button title="Voice input coming soon — available in the Healf mobile app"
              style="background:#2a2a2a;border:1px solid #444;border-radius:10px;padding:12px 14px;cursor:pointer;font-size:16px;"
              onclick="alert('Voice input coming soon — available in the Healf mobile app')">
              🎙
            </button>
          </div>
          <div id="helixResults"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000";
    let currentUser = "u001";
    let sessionViews = [];
    const PILLARS = ["Eat", "Move", "Mind", "Sleep"];

    const PRODUCTS = {
      p001: { name: "Magnesium Glycinate", brand: "Momentous", pillar: "Sleep", price: 29.99 },
      p002: { name: "Vitamin D3 + K2", brand: "Thorne", pillar: "Eat", price: 24.99 },
      p003: { name: "Omega-3 Fish Oil", brand: "Momentous", pillar: "Eat", price: 34.99 },
      p004: { name: "Creatine Monohydrate", brand: "Thorne", pillar: "Move", price: 34.99 },
      p005: { name: "Ashwagandha", brand: "Momentous", pillar: "Mind", price: 27.99 },
      p006: { name: "L-Theanine", brand: "Pure Encapsulations", pillar: "Mind", price: 19.99 },
      p007: { name: "Whey Protein", brand: "Momentous", pillar: "Move", price: 49.99 },
      p008: { name: "Vitamin B12", brand: "Thorne", pillar: "Eat", price: 18.99 },
      p009: { name: "Iron Bisglycinate", brand: "Pure Encapsulations", pillar: "Eat", price: 22.99 },
      p010: { name: "Sleep Drops", brand: "The Nue Co", pillar: "Sleep", price: 35.00 },
      p011: { name: "Zinc", brand: "Thorne", pillar: "Eat", price: 16.99 },
      p012: { name: "Curcumin Complete", brand: "Natroceutics", pillar: "Eat", price: 39.99 },
      p015: { name: "Electrolytes", brand: "LMNT", pillar: "Move", price: 24.99 },
      p016: { name: "Melatonin", brand: "Pure Encapsulations", pillar: "Sleep", price: 14.99 },
      p017: { name: "Colostrum", brand: "ARMRA", pillar: "Eat", price: 55.00 },
      p018: { name: "Berberine", brand: "Thorne", pillar: "Eat", price: 32.99 },
    };

    const USERS = {
      u001: {
        name: "Sarah", age: 32, gender: "Female",
        goals: ["Better Sleep", "Stress Relief"], pillar: "Sleep",
        purchases: ["p001"], subscriptions: ["p001"],
        zone: false, missed_second_test: false,
        biomarkers: {}, biomarker_delta: null
      },
      u002: {
        name: "James", age: 28, gender: "Male",
        goals: ["Muscle Strength", "Athletic Performance", "Energy"], pillar: "Move",
        purchases: ["p004", "p007", "p015"], subscriptions: ["p004", "p007"],
        zone: false, missed_second_test: false,
        biomarkers: {}, biomarker_delta: null
      },
      u003: {
        name: "Priya", age: 41, gender: "Female",
        goals: ["Energy", "Reduce Fatigue", "Immune Support"], pillar: "Eat",
        purchases: ["p002", "p008"], subscriptions: ["p002"],
        zone: true, missed_second_test: false,
        test1_date: "Jan 2024", test2_date: null,
        biomarkers: {
          "Vitamin D": "28 nmol/L — deficient",
          "Ferritin": "12 ug/L — deficient",
          "Active B12": "45 pmol/L — suboptimal"
        },
        biomarker_delta: null
      },
      u004: {
        name: "Tom", age: 25, gender: "Male",
        goals: [], pillar: null,
        purchases: [], subscriptions: [],
        zone: false, missed_second_test: false,
        biomarkers: {}, biomarker_delta: null
      },
      u005: {
        name: "Elena", age: 45, gender: "Female",
        goals: ["Heart Health", "Reduce Inflammation", "Brain Health"], pillar: "Eat",
        purchases: ["p003", "p012", "p002", "p011"], subscriptions: ["p003", "p012"],
        zone: true, missed_second_test: false,
        test1_date: "Jan 2024", test2_date: "Jul 2024",
        products_between_tests: ["p003", "p012"],
        composite_pattern: "cardiovascular_risk",
        pattern_markers: ["LDL Cholesterol", "CRP", "ApoB"],
        // Latest (test 2) biomarker values
        biomarkers: {
          "LDL Cholesterol": "3.6 mmol/L — elevated",
          "CRP": "2.1 mg/L — elevated",
          "ApoB": "0.95 g/L — suboptimal",
          "Magnesium": "0.78 mmol/L — suboptimal",
          "Vitamin D": "68 nmol/L — optimal"
        },
        // Jan → Jul delta — this is the labeled training example
        biomarker_delta: {
          "LDL Cholesterol": { before: 4.1, after: 3.6, unit: "mmol/L", change: -0.5, direction: "down" },
          "CRP": { before: 3.8, after: 2.1, unit: "mg/L", change: -1.7, direction: "down" },
          "ApoB": { before: 1.1, after: 0.95, unit: "g/L", change: -0.15, direction: "down" },
          "Magnesium": { before: 0.65, after: 0.78, unit: "mmol/L", change: +0.13, direction: "up" }
        }
      },
      u006: {
        name: "Marcus", age: 38, gender: "Male",
        goals: ["Heart Health", "Energy", "Better Sleep"], pillar: "Eat",
        purchases: ["p002", "p003"], subscriptions: ["p003"],
        zone: true, missed_second_test: true,
        test1_date: "Jan 2024", test2_date: null,
        biomarkers: {
          "Vitamin D": "32 nmol/L — deficient",
          "LDL Cholesterol": "3.8 mmol/L — elevated",
          "CRP": "2.9 mg/L — elevated",
          "Ferritin": "18 ug/L — deficient"
        },
        biomarker_delta: null
      }
    };

    function selectColdStartGoal(goal) {
      // Remove the card
      const card = document.getElementById("goalPillCard");
      if (card) card.remove();

      // Update shelf title immediately
      document.getElementById("shelfTitle").textContent = `Picked for ${goal}`;
      document.getElementById("contextBadge").textContent = "Goal selected";
      document.getElementById("contextBadge").className = "context-badge badge-personalised";

      // Map goal to pillar and re-rank shelf via browser model
      const GOAL_PILLAR = {
        "Better Sleep": "Sleep",
        "More Energy": "Eat",
        "Heart Health": "Eat",
        "Stress Relief": "Mind",
        "Muscle Strength": "Move"
      };
      const pillar = GOAL_PILLAR[goal] || "Eat";

      // Simulate session views toward that pillar
      // so the ONNX intent model picks it up
      const pillarProducts = Object.entries(PRODUCTS)
        .filter(([, p]) => p.pillar === pillar)
        .map(([id]) => id);
      sessionViews.push(...pillarProducts.slice(0, 3));

      const intent = inferIntent(sessionViews);
      updateIntentBar(intent);
      loadForYou(pillar);

      // Show notification
      showIntentNotification(pillar, sessionViews.length);
    }

    // ── On-browser intent model ───────────────────────────────────────────────────
    // In production: quantised ONNX model loaded via onnxruntime-web
    // Here: same interface, keyword-based classifier

    function resetSession() {
      sessionViews = [];
      PILLARS.forEach(p =>
        document.getElementById(`pill-${p.toLowerCase()}`).classList.remove("active")
      );
      document.getElementById("intent-label").textContent =
        "Session reset — no intent data";
      const existing = document.getElementById("intentNotification");
      if (existing) existing.remove();
      loadForYou(null);
    }

    function inferIntent(viewedProducts) {
      const scores = { Eat: 0, Move: 0, Mind: 0, Sleep: 0 };
      viewedProducts.forEach(pid => {
        const p = PRODUCTS[pid];
        if (p) scores[p.pillar] = (scores[p.pillar] || 0) + 1;
      });
      const total = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
      const probs = {};
      Object.entries(scores).forEach(([k, v]) => probs[k] = v / total);
      const top = Object.entries(probs).sort((a, b) => b[1] - a[1])[0];
      return { top_pillar: top[0], probabilities: probs };
    }

      PILLARS.forEach(p => {
        document.getElementById(`pill-${p.toLowerCase()}`)
          .classList.toggle("active", p === intent.top_pillar);

      const prob = Math.round((intent.probabilities[intent.top_pillar] || 0) * 100);
      document.getElementById("intent-label").textContent =
        sessionViews.length === 0
          ? "No session data yet — browse products to see intent update"
          : `Inferred: ${intent.top_pillar} (${prob}% confidence) — shelf re-ranking`;
    }

      document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = "none");
      document.getElementById(`tab-${tab}`).style.display = "block";
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      if (tab === "pdp") loadPDP();
      if (tab === "helix") loadHelixChips();
    }

    async function switchUser(userId) {
      currentUser = userId;
      sessionViews = [];
      PILLARS.forEach(p => document.getElementById(`pill-${p.toLowerCase()}`).classList.remove("active"));
      document.getElementById("intent-label").textContent = "No session data yet — browse products to see intent update";
      await Promise.all([loadUserCard(), loadHelixChips(), loadForYou()]);
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    switchUser("u001");
  </script>
</body>
